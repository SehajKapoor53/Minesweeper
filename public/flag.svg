<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">

  <defs>
    <linearGradient id="pole" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#8c8c8c"/>
      <stop offset="50%" stop-color="#d6d6d6"/>
      <stop offset="100%" stop-color="#5e5e5e"/>
    </linearGradient>

    <linearGradient id="flag" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#b30000"/>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- floor shadow -->
  <ellipse cx="104" cy="224" rx="42" ry="12"
           fill="#000"
           opacity="0.2"/>

  <g filter="url(#shadow)">

    <!-- pole -->
    <rect x="88" y="18" width="14" height="176"
          rx="4"
          fill="url(#pole)"/>

    <!-- flag cloth -->
    <path d="
      M102 28
      C148 34, 170 52, 196 44
      L196 108
      C166 118, 144 104, 102 98
      Z"
      fill="url(#flag)"
      stroke="#7a0000"
      stroke-width="4"/>

    <!-- fabric folds -->
    <path d="
      M126 38
      C142 52, 142 72, 126 88"
      fill="none"
      stroke="#ff9e9e"
      stroke-width="5"
      opacity="0.45"/>

    <path d="
      M154 42
      C168 58, 166 78, 152 92"
      fill="none"
      stroke="#7a0000"
      stroke-width="4"
      opacity="0.35"/>

    <!-- base -->
    <ellipse cx="95" cy="206" rx="34" ry="10"
             fill="#444"/>

    <rect x="62" y="194" width="66" height="18"
          rx="8"
          fill="#666"
          stroke="#2e2e2e"
          stroke-width="4"/>
  </g>
</svg>