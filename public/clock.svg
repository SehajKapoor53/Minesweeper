<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="90" fill="#1f2937" stroke="#111827" stroke-width="8"/>

  <!-- Inner Face -->
  <circle cx="100" cy="100" r="78" fill="#f9fafb"/>

  <!-- Hour Marks -->
  <g stroke="#111827" stroke-width="4" stroke-linecap="round">
    <line x1="100" y1="28" x2="100" y2="40"/>
    <line x1="100" y1="160" x2="100" y2="172"/>
    <line x1="28" y1="100" x2="40" y2="100"/>
    <line x1="160" y1="100" x2="172" y2="100"/>
  </g>

  <!-- Minute Marks -->
  <g fill="#6b7280">
    <circle cx="100" cy="20" r="2"/>
    <circle cx="180" cy="100" r="2"/>
    <circle cx="100" cy="180" r="2"/>
    <circle cx="20" cy="100" r="2"/>
  </g>

  <!-- Hour Hand -->
  <line x1="100" y1="100" x2="100" y2="65"
        stroke="#111827" stroke-width="6"
        stroke-linecap="round"/>

  <!-- Minute Hand -->
  <line x1="100" y1="100" x2="135" y2="100"
        stroke="#111827" stroke-width="4"
        stroke-linecap="round"/>

  <!-- Center Dot -->
  <circle cx="100" cy="100" r="6" fill="#ef4444"/>
</svg>
